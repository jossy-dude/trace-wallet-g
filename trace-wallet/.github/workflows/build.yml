name: Build Vault Pro

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: vault_pro/package-lock.json

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Node dependencies
      run: |
        cd vault_pro
        npm ci

    - name: Install Python dependencies
      run: |
        cd vault_pro/python
        pip install -r requirements.txt

    - name: Build React app
      run: |
        cd vault_pro
        npm run build

    - name: Build Electron app
      run: |
        cd vault_pro
        npm run dist

    - name: Upload Windows artifact
      uses: actions/upload-artifact@v4
      with:
        name: VaultPro-Windows
        path: vault_pro/dist-electron/*.exe

  build-macos:
    runs-on: macos-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: vault_pro/package-lock.json

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Node dependencies
      run: |
        cd vault_pro
        npm ci

    - name: Install Python dependencies
      run: |
        cd vault_pro/python
        pip install -r requirements.txt

    - name: Build React app
      run: |
        cd vault_pro
        npm run build

    - name: Build Electron app
      run: |
        cd vault_pro
        npm run dist

    - name: Upload macOS artifact
      uses: actions/upload-artifact@v4
      with:
        name: VaultPro-macOS
        path: vault_pro/dist-electron/*.dmg

  build-linux:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: vault_pro/package-lock.json

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Node dependencies
      run: |
        cd vault_pro
        npm ci

    - name: Install Python dependencies
      run: |
        cd vault_pro/python
        pip install -r requirements.txt

    - name: Build React app
      run: |
        cd vault_pro
        npm run build

    - name: Build Electron app
      run: |
        cd vault_pro
        npm run dist

    - name: Upload Linux artifact
      uses: actions/upload-artifact@v4
      with:
        name: VaultPro-Linux
        path: |
          vault_pro/dist-electron/*.AppImage
          vault_pro/dist-electron/*.deb
